<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Quality Academy - QA კურსების მიმოხილვები | ლელა გაბელაია</title>
    <meta name="description" content="Quality Academy-ს სტუდენტების წარმატების ისტორიები. ისწავლე QA Manual და Automation Testing  ლელა გაბელაიასთან ერთად.">
    <meta name="keywords" content="QA Testing, Automation Testing, Quality Academy, ლელა გაბელაია, ტესტირების კურსები, დასაქმება IT-ში">
    
    <style>
        :root {
            --bg-body: #f4f7f6;
            --bg-card: #ffffff;
            --text-main: #2c3e50;
            --accent: #007bff;
            --progress-bg: #e0e0e0;
            --shadow: rgba(0, 0, 0, 0.03);
        }

        [data-theme="dark"] {
            --bg-body: #121212;
            --bg-card: #1e1e1e;
            --text-main: #e0e0e0;
            --accent: #3793ff;
            --progress-bg: #333;
            --shadow: rgba(0, 0, 0, 0.6);
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            transition: background 0.3s ease;
            padding: 20px;
        }

        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            cursor: pointer;
            background: var(--bg-card);
            border: 2px solid var(--accent);
            color: var(--text-main);
            padding: 8px 16px;
            border-radius: 25px;
            font-weight: 600;
            z-index: 1000;
        }

        .card {
            background: var(--bg-card);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 15px 35px var(--shadow);
            max-width: 600px;
            width: 100%;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .progress-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: var(--progress-bg);
        }

        #progressBar {
            height: 100%;
            width: 0%;
            background: var(--accent);
            transition: width 0.1s linear;
        }
        
        /* მთავარი სათაური ზემოთ */
        .main-header {
            margin-bottom: 20px;
            text-align: center;
        }

        .main-header h1 {
            color: var(--accent);
            font-size: 1.8rem;
            margin: 10px 0;
        }

        .review-content {
            min-height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            margin-top: 10px;
            background: var(--shadow);
            order: none;
            border-radius: 10px;
        }

        #reviewText {
            font-size: 1.15rem;
            line-height: 1.6;
            text-align: center;
            font-style: italic;
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        .fade { opacity: 0; transform: scale(0.95); }

        .controls {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            justify-content: center;
        }

        button.btn {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: var(--accent);
            color: white;
            font-weight: bold;
            transition: all 0.2s ease;
        }

        button.btn:hover { filter: brightness(1.1); transform: translateY(-2px); }
        .btn-copy { background: #28a745 !important; }

        /* Meme Section - Bottom & Center */
        .meme-footer {
            width: 100%;
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            border-top: 1px solid var(--progress-bg);
            padding-top: 20px;
        }

        .meme-text h3 { 
            color: var(--accent); 
            margin: 0 0 15px 0; 
            font-size: 1.2rem;
        }

        .meme-img {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
            border: 2px solid var(--accent);
            filter: grayscale(100%);
            transition: 0.4s ease;
        }

        .meme-img:hover { 
            filter: grayscale(0%); 
            transform: scale(1.02); 
        }

        .pause-info { 
            font-size: 0.7rem; 
            margin-top: 15px; 
            opacity: 0.5; 
            text-align: center;
        }

        @media (max-width: 600px) {
            .card { padding: 1.5rem; }
            #reviewText { font-size: 1rem; }
        }
    </style>
</head>
<body>

<button class="theme-toggle" onclick="toggleTheme()">🌓 რეჟიმი</button>

<main class="card" onmouseenter="pauseTimer()" onmouseleave="resumeTimer()">
    <div class="progress-container">
        <div id="progressBar"></div>
    </div>
    <div class="main-header">
        <h1>🌟 აირჩიე მადლობა</h1>
    </div>
    <div class="review-content">
        <blockquote id="reviewText">იტვირთება...</blockquote>
    </div>

    <div class="controls">
        <button class="btn" onclick="nextReview()">შემდეგი</button>
        <button class="btn btn-copy" onclick="copyReview()">📋 კოპირება</button>
    </div>

    let currentIndex = Math.floor(Math.random() * reviews.length);
    let progress = 0;
    let isPaused = false;
    const duration = 10000; // 10 წამი
    const intervalStep = 100; // ყოველ 0.1 წამში განახლება
    
    const textElement = document.getElementById('reviewText');
    const progressBar = document.getElementById('progressBar');

    function updateReview() {
        textElement.classList.add('fade');
        setTimeout(() => {
            let nextIndex;
            do {
                nextIndex = Math.floor(Math.random() * reviews.length);
            } while (nextIndex === currentIndex);
            
            currentIndex = nextIndex;
            textElement.innerText = reviews[currentIndex];
            textElement.classList.remove('fade');
            progress = 0;
        }, 600);
    }

    function handleProgressBar() {
        if (!isPaused) {
            progress += (intervalStep / duration) * 100;
            progressBar.style.width = progress + '%';
            if (progress >= 100) {
                updateReview();
            }
        }
    }

    function pauseTimer() { isPaused = true; }
    function resumeTimer() { isPaused = false; }
    function nextReview() { progress = 0; updateReview(); }

    function copyReview() {
        navigator.clipboard.writeText(textElement.innerText).then(() => {
            const btn = document.querySelector('.btn-copy');
            btn.innerText = "✅ დაკოპირდა!";
            setTimeout(() => btn.innerText = "📋 კოპირება", 2000);
        });
    }

    function toggleTheme() {
        const body = document.body;
        const theme = body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        body.setAttribute('data-theme', theme);
        localStorage.setItem('preferred-theme', theme);
    }

    // ინიციალიზაცია
    window.onload = () => {
        const savedTheme = localStorage.getItem('preferred-theme') || 'light';
        document.body.setAttribute('data-theme', savedTheme);
        textElement.innerText = reviews[currentIndex];
        setInterval(handleProgressBar, intervalStep);
    };
